# ===============================
# DESARROLLO LOCAL
# ===============================

# BASE DE DATOS
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/estampaider}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}

# SERVIDOR
server.port=${SERVER_PORT:8080}

# CORS
spring.mvc.dispatch-options-request=true
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5501,http://127.0.0.1:5501,http://localhost:3000,http://127.0.0.1:3000}

# ZONA HORARIA
spring.jackson.time-zone=America/Bogota

# JWT
jwt.secret=${JWT_SECRET:CHANGE_ME_IN_ENV}
jwt.expiration=${JWT_EXPIRATION:86400000}

# WHATSAPP
whatsapp.verify.token=${WHATSAPP_VERIFY_TOKEN:CHANGE_ME_DEV}
whatsapp.access.token=${WHATSAPP_ACCESS_TOKEN:CHANGE_ME_DEV}
whatsapp.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID:CHANGE_ME_DEV}

# ASESOR
asesor.telefono=${ASESOR_TELEFONO:573153625992}

# UPLOADS
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB