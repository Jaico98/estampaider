# Desarrollo local

spring.datasource.url=jdbc:mysql://localhost:3306/estampaider
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.mvc.dispatch-options-request=true

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5501,http://127.0.0.1:5501,http://localhost:3000,http://127.0.0.1:3000}

whatsapp.verify.token=${WHATSAPP_VERIFY_TOKEN:CHANGE_ME_DEV}
whatsapp.access.token=${WHATSAPP_ACCESS_TOKEN:CHANGE_ME_DEV}
whatsapp.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID:CHANGE_ME_DEV}

asesor.telefono=${ASESOR_TELEFONO:573153625992}