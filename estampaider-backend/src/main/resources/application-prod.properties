# ===============================
# PRODUCCION
# ===============================

# BASE DE DATOS
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}

# SERVIDOR
server.port=${SERVER_PORT:8080}

# CORS
spring.mvc.dispatch-options-request=true
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5501,http://127.0.0.1:5501,http://localhost:3000,http://127.0.0.1:3000,https://jaico98.github.io,https://estampaider.com,https://www.estampaider.com}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ZONA HORARIA
spring.jackson.time-zone=America/Bogota

# JWT
app.jwt.secret=${JWT_SECRET}

jwt.expiration=${JWT_EXPIRATION:86400000}

# WHATSAPP
whatsapp.verify.token=${WHATSAPP_VERIFY_TOKEN}
whatsapp.access.token=${WHATSAPP_ACCESS_TOKEN}
whatsapp.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID}

# ASESOR
asesor.telefono=${ASESOR_TELEFONO}

# UPLOADS
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.jpa.open-in-view=false
logging.level.org.springframework.security=INFO