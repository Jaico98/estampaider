spring.application.name=estampaider-backend

# Perfil activo
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================
# BASE DE DATOS
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/estampaider}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialecto
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Inicialización
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}

# ===============================
# SERVIDOR
# ===============================
server.port=${SERVER_PORT:8080}

# ===============================
# CORS
# ===============================
spring.mvc.dispatch-options-request=true

# ===============================
# ZONA HORARIA
# ===============================
spring.jackson.time-zone=America/Bogota

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:CHANGE_ME_IN_ENV}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# WHATSAPP
# ===============================
whatsapp.verify.token=${WHATSAPP_VERIFY_TOKEN:estampaider_token_123}
whatsapp.access.token=${WHATSAPP_ACCESS_TOKEN:CHANGE_ME}
whatsapp.phone.number.id=${WHATSAPP_PHONE_ID:1039205345948798}

# ===============================
# UPLOADS
# ===============================
app.upload.dir=uploads

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB