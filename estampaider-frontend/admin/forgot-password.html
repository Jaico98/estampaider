<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | Estampaider</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #8baff3, #ff4b2b);
        }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>Recuperar contraseña</h2>

    <input type="text" id="telefono" placeholder="Número de teléfono" required>

    <button id="btnEnviar">Enviar</button>

    <p id="mensaje"></p>
</div>

<script>
document.getElementById("btnEnviar").addEventListener("click", async () => {

    const telefono = document.getElementById("telefono").value.trim();
    const mensaje = document.getElementById("mensaje");

    if (!telefono) {
        mensaje.innerText = "Ingresa tu número";
        return;
    }

    try {
        const response = await fetch("http://localhost:8080/api/auth/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ telefono })
        });

        const data = await response.json();

        if (!response.ok) {
            mensaje.innerText = data;
            return;
        }

        window.location.href = data.resetLink;

    } catch {
        mensaje.innerText = "Error de conexión";
    }

});
</script>

</body>
</html>
