<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | Estampaider</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
            linear-gradient(135deg, #8baff3, #ff4b2b);
        }
        </style>
</head>
<body>

<div class="auth-container">
    <h2>🔒 Nueva contraseña</h2>

    <input type="password" id="password" placeholder="Nueva contraseña">
    <input type="password" id="confirmPassword" placeholder="Confirmar contraseña">

    <button onclick="resetPassword()">Cambiar contraseña</button>

    <p id="mensaje"></p>
</div>

<script>
    async function resetPassword() {
    
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");
    
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
    
        if (password !== confirmPassword) {
            document.getElementById("mensaje").innerText = "Las contraseñas no coinciden";
            return;
        }
    
        const response = await fetch("http://localhost:8080/api/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, password })
        });
    
        const text = await response.text();
    
        document.getElementById("mensaje").innerText = text;
    }
    </script>

</body>
</html>
