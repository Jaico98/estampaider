<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reseñas Admin | Estampaider</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body{
      margin:0;
      font-family:Inter,system-ui,sans-serif;
      background:linear-gradient(180deg,#f7fbff 0%, #eef4fb 100%);
      color:#0f172a;
    }
    .resenas-admin-shell{
      max-width:1200px;
      margin:0 auto;
      padding:28px 18px 40px;
    }
    .resenas-admin-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:14px;
      margin-bottom:22px;
      padding:24px;
      background:#fff;
      border:1px solid #e2e8f0;
      border-radius:24px;
      box-shadow:0 18px 40px rgba(15,23,42,.08);
    }
    .resenas-admin-top h1{
      margin:0;
      font-size:34px;
    }
    .resenas-admin-top p{
      margin:8px 0 0;
      color:#64748b;
    }
    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .top-actions button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-weight:800;
      cursor:pointer;
    }
    .btn-back{
      background:#e0f2fe;
      color:#075985;
    }
    .btn-refresh{
      background:#dcfce7;
      color:#166534;
    }
    #listaResenasAdmin{
      display:grid;
      gap:16px;
    }
    .admin-resena-card{
      background:#fff;
      border:1px solid #e2e8f0;
      border-radius:24px;
      padding:20px;
      box-shadow:0 10px 24px rgba(15,23,42,.05);
    }
    .admin-resena-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .admin-resena-top h3{
      margin:0;
      font-size:20px;
    }
    .admin-meta{
      color:#64748b;
      font-size:13px;
      margin-top:6px;
    }
    .admin-stars{
      font-size:18px;
    }
    .admin-comentario{
      margin:10px 0 14px;
      color:#334155;
      line-height:1.7;
    }
    .admin-respuesta{
      background:#f8fafc;
      border:1px solid #dbe7f0;
      border-radius:16px;
      padding:14px;
      margin-top:10px;
    }
    .admin-respuesta strong{
      display:block;
      margin-bottom:6px;
      color:#0f172a;
    }
    .admin-respuesta textarea{
      width:100%;
      box-sizing:border-box;
      min-height:100px;
      resize:vertical;
      border:1px solid #dbe2ea;
      border-radius:14px;
      padding:12px 14px;
      font-size:14px;
      outline:none;
    }
    .admin-respuesta textarea:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(59,130,246,.10);
    }
    .admin-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .admin-actions button{
      border:none;
      border-radius:14px;
      padding:11px 15px;
      font-weight:800;
      cursor:pointer;
    }
    .btn-responder{
      background:linear-gradient(135deg,#14a6d6,#0ea5e9);
      color:#fff;
    }
    .btn-eliminar{
      background:#fee2e2;
      color:#b91c1c;
    }
    .empty-admin{
      background:#fff;
      border:1px dashed #cbd5e1;
      border-radius:22px;
      padding:28px;
      text-align:center;
      color:#64748b;
    }
    @media (max-width: 768px){
      .resenas-admin-top{
        padding:18px;
      }
      .resenas-admin-top h1{
        font-size:28px;
      }
      .top-actions{
        width:100%;
      }
      .top-actions button{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <script>
    const auth = JSON.parse(sessionStorage.getItem("auth") || "null");
    if (!auth || auth.rol !== "ADMIN" || !auth.token) {
      sessionStorage.setItem("redirectAfterLogin", "/resenas-admin.html");
      window.location.href = "admin/login.html";
    }
  </script>

  <main class="resenas-admin-shell">
    <section class="resenas-admin-top">
      <div>
        <h1>⭐ Reseñas de clientes</h1>
        <p>Responde opiniones, fortalece confianza y gestiona la reputación de Estampaider.</p>
      </div>

      <div class="top-actions">
        <button class="btn-back" onclick="window.location.href='pedidos.html'">⬅ Volver a pedidos</button>
        <button class="btn-refresh" onclick="cargarResenasAdmin()">🔄 Actualizar</button>
      </div>
    </section>

    <section id="listaResenasAdmin">
      <div class="empty-admin">Cargando reseñas...</div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="resenas-admin.js"></script>
  <script src="branding.js"></script>
</body>
</html>
