<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensajes Admin | Estampaider</title>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #e6ebf2;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #2563eb;
      --brand-soft: #dbeafe;
      --success: #16a34a;
      --success-soft: #dcfce7;
      --warn: #f59e0b;
      --warn-soft: #fef3c7;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
      --radius: 20px;
    }

    body { background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%); color: var(--text); }
    .mensajes-layout { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(360px, .9fr); gap: 24px; align-items: start; }
    .toolbar, .filtros, .chat-header, .chat-footer, .mensaje-acciones, .paginacion-mensajes { display: flex; gap: 10px; flex-wrap: wrap; }
    .toolbar input, .chat-footer textarea {
      flex: 1;
      min-width: 240px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      background: #fff;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .toolbar input:focus, .chat-footer textarea:focus { outline: 2px solid rgba(37, 99, 235, .18); border-color: var(--brand); }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
      padding: 18px 20px;
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.8);
      backdrop-filter: blur(8px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .topbar h1 { margin: 0; font-size: clamp(1.5rem, 2vw, 2rem); }
    .topbar a, button {
      border: none;
      border-radius: 14px;
      padding: 11px 16px;
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
      box-shadow: 0 10px 20px rgba(37, 99, 235, .18);
    }
    .topbar a:hover, button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .btn-secundario { background: #eef2ff; color: #334155; box-shadow: none; }
    .btn-peligro { background: var(--danger); color: #fff; box-shadow: 0 10px 20px rgba(220, 38, 38, .14); }
    .filtros { margin-bottom: 12px; }
    .filtros button { background: #fff; color: #475569; border: 1px solid var(--line); box-shadow: none; }
    .filtros button.activo { background: var(--brand); color: #fff; border-color: var(--brand); }
    .chat-panel, .panel-lista, .stat-card {
      border: 1px solid rgba(226, 232, 240, .9);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .95);
      box-shadow: var(--shadow);
    }
    .panel-lista { padding: 18px; }
    .chat-panel { padding: 18px; min-height: 620px; position: sticky; top: 16px; }
    .chat-panel.hidden { display: none; }
    .chat-header { justify-content: space-between; align-items: center; padding-bottom: 14px; border-bottom: 1px solid var(--line); }
    .chat-identidad { display: flex; flex-direction: column; gap: 4px; }
    .chat-identidad strong { font-size: 1.05rem; }
    .chat-estado { color: var(--muted); font-size: .92rem; }
    .chat-estado.online { color: var(--success); font-weight: 600; }
    .chat-body {
      height: 470px;
      overflow-y: auto;
      border: 1px solid #edf2f7;
      border-radius: 18px;
      padding: 14px;
      margin: 16px 0;
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, .07), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, #f6f8fc 100%);
    }
    .chat-row { display: flex; margin-bottom: 12px; }
    .row-admin { justify-content: flex-end; }
    .row-cliente { justify-content: flex-start; }
    .msg-admin, .msg-cliente {
      max-width: 82%;
      padding: 12px 14px;
      border-radius: 18px;
      margin-bottom: 0;
      line-height: 1.45;
      position: relative;
      word-break: break-word;
    }
    .msg-admin {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: #fff;
      border-bottom-right-radius: 6px;
    }
    .msg-cliente {
      background: #fff;
      border: 1px solid #e5e7eb;
      color: #111827;
      border-bottom-left-radius: 6px;
    }
    .msg-meta { display: block; font-size: 12px; margin-top: 6px; opacity: .8; }
    .mensaje-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      background: #fff;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .mensaje-card:hover { transform: translateY(-2px); box-shadow: 0 18px 35px rgba(15,23,42,.08); border-color: #cbd5e1; }
    .mensaje-card.no-leido { border-left: 5px solid var(--brand); }
    .mensaje-card h3 { margin: 0 0 4px; }
    .mensaje-card p { margin: 6px 0; color: #475569; }
    .mensaje-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 8px; }
    .mensaje-chip { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .chip-ok { background: var(--success-soft); color: var(--success); }
    .chip-alerta { background: var(--warn-soft); color: #b45309; }
    .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
    .stat-card { padding: 16px 18px; }
    .stat-label { display: block; color: var(--muted); font-size: .92rem; margin-bottom: 6px; }
    .stat-card strong { font-size: 1.7rem; }
    .separador-fecha { text-align: center; margin: 14px 0; font-size: 12px; color: #64748b; font-weight: 700; text-transform: capitalize; }
    .typing {
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #475569;
      background: #fff;
    }
    .typing-dots { display: inline-flex; gap: 4px; }
    .typing-dots i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #94a3b8;
      display: inline-block;
      animation: saltar 1s infinite ease-in-out;
    }
    .typing-dots i:nth-child(2) { animation-delay: .15s; }
    .typing-dots i:nth-child(3) { animation-delay: .3s; }
    .vacio { padding: 28px; text-align: center; color: var(--muted); }
    .check { font-weight: 700; }
    .paginacion-mensajes { justify-content: center; margin-top: 12px; align-items: center; }
    @keyframes saltar {
      0%, 80%, 100% { transform: scale(.7); opacity: .45; }
      40% { transform: scale(1); opacity: 1; }
    }
    @media (max-width: 1024px) {
      .mensajes-layout { grid-template-columns: 1fr; }
      .chat-panel { position: static; min-height: 520px; }
    }
    @media (max-width: 700px) {
      .dashboard { grid-template-columns: 1fr; }
      .topbar { padding: 16px; }
      .panel-lista, .chat-panel { padding: 14px; }
      .chat-body { height: 420px; }
      .msg-admin, .msg-cliente { max-width: 90%; }
    }
  </style>
</head>
<body>
  <main class="container" style="padding: 24px; max-width: 1320px; margin: 0 auto;">
    <div class="topbar">
      <div>
        <h1>Mensajes de contacto <span id="badgeMensajes"></span></h1>
        <p style="margin: 6px 0 0; color: #64748b;">Administra conversaciones y responde a tus clientes desde un panel más claro.</p>
      </div>
      <div class="toolbar">
        <a href="pedidos.html">⬅ Volver a pedidos</a>
      </div>
    </div>

    <section id="statsMensajes" class="dashboard"></section>

    <div class="mensajes-layout">
      <section class="panel-lista">
        <div class="toolbar" style="margin-bottom: 12px;">
          <input type="search" id="buscadorMensajes" placeholder="Buscar por nombre, correo, mensaje o WhatsApp">
          <button type="button" id="excel">Exportar Excel</button>
          <button type="button" id="pdf" class="btn-secundario">Exportar PDF</button>
        </div>

        <div class="filtros">
          <button type="button" data-filtro-mensaje="TODOS" class="activo">Todos</button>
          <button type="button" data-filtro-mensaje="NO_LEIDOS">No leídos</button>
          <button type="button" data-filtro-mensaje="LEIDOS">Leídos</button>
        </div>

        <div id="mensajes"></div>
        <div id="paginacion" class="paginacion-mensajes"></div>
      </section>

      <aside id="chat-container" class="chat-panel hidden">
        <div class="chat-header">
          <div class="chat-identidad">
            <strong id="chat-nombre">Cliente</strong>
            <span id="chat-estado" class="chat-estado">Selecciona una conversación</span>
          </div>
          <div class="toolbar">
            <button type="button" id="btnEliminarChat" class="btn-peligro">🗑 Eliminar chat</button>
            <button type="button" id="btnCerrarChat" class="btn-secundario">✖ Cerrar</button>
          </div>
        </div>
        <div id="chat-mensajes" class="chat-body">
          <div class="vacio">Abre una conversación para ver los mensajes.</div>
        </div>
        <div class="chat-footer">
          <textarea id="chat-input" rows="3" placeholder="Escribe tu respuesta"></textarea>
          <button type="button" id="btnEnviarChat">Enviar</button>
        </div>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="config.js"></script>
  <script src="branding.js"></script>
  <script src="carrito-global.js"></script>
  <script src="mensajes.js"></script>
</body>
</html>
