<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes Admin | Estampaider</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<style>
.header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 10000;
}

.header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.admin-container {
    margin-top: 70px;
}
    /* CONTENEDOR */
#notificaciones-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* BURBUJA */
.notificacion {
    min-width: 280px;
    max-width: 320px;
    background: #111;
    color: white;
    border-radius: 12px;
    padding: 12px 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    cursor: pointer;
    opacity: 0;
    transform: translateX(100%);
    transition: all 0.4s ease;
    border-left: 5px solid #22c55e;
}

/* SHOW */
.notificacion.show {
    opacity: 1;
    transform: translateX(0);
}

/* TEXTO */
.notificacion h4 {
    margin: 0;
    font-size: 14px;
}

.notificacion p {
    margin: 3px 0 0;
    font-size: 12px;
    color: #ccc;
}

/* HOVER */
.notificacion:hover {
    background: #1a1a1a;
}

/* CONTENEDOR */
.chat {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 350px;
    height: 500px;
    background: #e5ddd5;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    overflow: hidden;
    z-index: 900;
}

.hidden {
    display: none;
}

/* HEADER */
.chat-header {
    background: #075E54;
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
}

/* BODY */
.chat-body {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

/* MENSAJES */
.msg-admin {
    align-self: flex-end;
    background: #DCF8C6;
    padding: 8px 10px;
    border-radius: 10px;
    margin: 5px 0;
    max-width: 70%;
    font-size: 14px;
    border-bottom-right-radius: 2px;
}

.msg-cliente {
    align-self: flex-start;
    background: white;
    padding: 8px 10px;
    border-radius: 10px;
    margin: 5px 0;
    max-width: 70%;
    font-size: 14px;
    border-bottom-left-radius: 2px;
}

/* META INFO */
.meta {
    display: flex;
    justify-content: flex-end;
    gap: 5px;
    font-size: 10px;
    color: gray;
}

/* CHECKS */
.check {
    font-size: 12px;
    margin-left: 5px;
    color: gray;
}

.check.doble {
    letter-spacing: -2px;
}

.check.azul {
    color: #34B7F1; /* azul WhatsApp */
}

/* FOOTER */
.chat-footer {
    display: flex;
    padding: 10px;
    background: #f0f0f0;
}

.chat-footer input {
    flex: 1;
    border: none;
    padding: 8px;
    border-radius: 20px;
    outline: none;
}

.chat-footer button {
    margin-left: 5px;
    border: none;
    background: #25D366;
    color: white;
    border-radius: 50%;
    width: 40px;
    cursor: pointer;
}

.chat-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 300px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
}

.chat-mensajes {
    height: 250px;
    overflow-y: auto;
    padding: 10px;
}

.chat-input {
    display: flex;
}

.chat-input input {
    flex: 1;
    padding: 8px;
}

.chat-input button {
    padding: 8px;
}

.separador-fecha {
    text-align: center;
    margin: 10px 0;
    font-size: 11px;
    background: #d3d3d3;
    padding: 4px 10px;
    border-radius: 10px;
    align-self: center;
}


@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
@media (max-width: 600px) {

.chat {
    width: 100%;
    height: 100%;
    right: 0;
    bottom: 0;
    border-radius: 0;
}

.chat-header {
    font-size: 16px;
}

.chat-body {
    padding: 8px;
}

.msg-admin, .msg-cliente {
    max-width: 85%;
    font-size: 13px;
}

.chat-footer input {
    font-size: 14px;
}
}
.typing {
    font-style: italic;
    opacity: 0.7;
}

.typing .dots::after {
    content: "...";
    animation: dots 1.5s steps(3, end) infinite;
}

@keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
}
</style>
</head>
<body>
    <script>
        const auth = JSON.parse(sessionStorage.getItem("auth"));
        if (!auth || auth.rol !== "ADMIN") {
            window.location.href = "admin/login.html";
        }
    </script>

<header class="header">
    <div class="header-container">
        <h2 style="color:rgb(255, 255, 255);">📩 Mensajes de Contacto</h2>
        <a href="pedidos.html" style="color:rgb(255, 255, 255);">⬅ Volver a pedidos</a>
    </div>
</header>

<main class="admin-container">

    <div id="mensajes"></div>

<!-- ================= CHAT WHATSAPP ================= -->
<div id="chat-container" class="chat hidden">

    <!-- HEADER -->
    <div class="chat-header">
        <div style="display:flex;flex-direction:column;">
            <span id="chat-nombre">Cliente</span>
            <small id="chat-estado" style="font-size:11px;color:#d1d1d1;"></small>
        </div>
    
        <div style="display:flex;gap:5px;">
            <button onclick="cerrarChat()">✖</button>
        </div>
    </div>

    <!-- MENSAJES -->
    <div id="chat-mensajes" class="chat-body"></div>

    <!-- INPUT -->
    <div class="chat-footer">
        <input id="chat-input" type="text" placeholder="Escribe un mensaje..." />
        <button onclick="enviarMensajeChat()">➤</button>
    </div>

</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.29/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
<script src="mensajes.js"></script>
<div id="notificaciones-container"></div>

</body>

</html>
